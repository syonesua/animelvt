<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 08 - Bài 2: Slider Tự Động</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; padding-top: 50px; }

        .slideshow-container {
            max-width: 800px;
            position: relative;
            margin: auto;
            border: 5px solid #000;
        }

        .mySlides { display: none; }
        .mySlides img { width: 100%; vertical-align: middle; height: 450px; object-fit: cover; }

        .prev, .next {
            cursor: pointer;
            position: absolute;
            top: 50%;
            width: auto;
            padding: 16px;
            margin-top: -22px;
            color: white;
            font-weight: bold;
            font-size: 18px;
            transition: 0.6s ease;
            border-radius: 0 3px 3px 0;
            user-select: none;
            text-decoration: none;
        }
        .next { right: 0; border-radius: 3px 0 0 3px; }
        .prev:hover, .next:hover { background-color: rgba(0,0,0,0.8); }

        .dot-container { text-align: center; padding: 20px; background: #fff; }
        .dot {
            cursor: pointer;
            height: 15px;
            width: 15px;
            margin: 0 5px;
            background-color: #bbb;
            border-radius: 50%;
            display: inline-block;
            transition: background-color 0.6s ease;
        }
        .active, .dot:hover { background-color: #717171; }

        .fade {
            animation-name: fade;
            animation-duration: 1.5s;
        }
        @keyframes fade {
            from {opacity: .4} 
            to {opacity: 1}
        }
    </style>
</head>
<body>

<div style="width: 100%; max-width: 800px;">
    <div class="slideshow-container">
        <div class="mySlides fade"><img src="./Lab08/img/slide_1.jpg" alt="Slide 1"></div>
        <div class="mySlides fade"><img src="./Lab08/img/slide_2.jpg" alt="Slide 2"></div>
        <div class="mySlides fade"><img src="./Lab08/img/slide_3.jpg" alt="Slide 3"></div>
        <div class="mySlides fade"><img src="./Lab08/img/slide_4.jpg" alt="Slide 4"></div>
        <div class="mySlides fade"><img src="./Lab08/img/slide_5.jpg" alt="Slide 5"></div>

        <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
        <a class="next" onclick="plusSlides(1)">&#10095;</a>
    </div>

    <div class="dot-container">
        <span class="dot" onclick="currentSlide(1)"></span> 
        <span class="dot" onclick="currentSlide(2)"></span> 
        <span class="dot" onclick="currentSlide(3)"></span> 
        <span class="dot" onclick="currentSlide(4)"></span> 
        <span class="dot" onclick="currentSlide(5)"></span> 
    </div>
</div>

<script>
    let slideIndex = 1;
    showSlides(slideIndex);

    // Chuyển slide thủ công
    function plusSlides(n) {
        showSlides(slideIndex += n);
    }

    // Nhảy tới slide cụ thể qua chấm tròn
    function currentSlide(n) {
        showSlides(slideIndex = n);
    }

    function showSlides(n) {
        let i;
        let slides = document.getElementsByClassName("mySlides");
        let dots = document.getElementsByClassName("dot");
        
        if (n > slides.length) {slideIndex = 1}    
        if (n < 1) {slideIndex = slides.length}
        
        for (i = 0; i < slides.length; i++) {
            slides[i].style.display = "none";  
        }
        for (i = 0; i < dots.length; i++) {
            dots[i].className = dots[i].className.replace(" active", "");
        }
        
        slides[slideIndex-1].style.display = "block";  
        dots[slideIndex-1].className += " active";
    }

    /*--------------------------------------------------------------
      YÊU CẦU BÀI 2: TỰ ĐỘNG CHUYỂN SLIDE
      Sử dụng setInterval để gọi hàm plusSlides(1) mỗi 2 giây (2000ms)
    ---------------------------------------------------------------*/
    setInterval(function() {
        plusSlides(1);
    }, 2000);
    
</script>

</body>
</html>
