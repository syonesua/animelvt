<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Lab 05 - Bài 1: Tạo Menu</title>
    <style>
        /* Thiết lập font chữ chung */
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        /* =========================================
           1. ĐỊNH DẠNG MENU NGANG
           ========================================= */
        ul.h-menu {
            list-style-type: none; /* Bỏ dấu chấm tròn */
            padding: 0;
            margin: 0 0 40px 0;
            display: flex; /* Dàn các item theo chiều ngang */
            background-color: #5fe3cc; /* Nền xanh ngọc / lục lam mặc định */
            width: fit-content; /* Chiều rộng ôm vừa khít nội dung */
        }

        ul.h-menu li {
            transition: all 0.3s ease; /* Hiệu ứng chuyển đổi mượt mà */
        }

        ul.h-menu li a {
            display: block;
            padding: 15px 25px;
            text-decoration: none; /* Bỏ gạch chân */
            color: #4a6b8c; /* Màu chữ mặc định */
            font-size: 16px;
        }

        /* Yêu cầu: Hover vào đổi nền vàng, bo góc 5px, chữ đậm */
        ul.h-menu li:hover {
            background-color: #f39c12; /* Màu nền vàng cam */
            border-radius: 5px; /* Bo cong 4 góc 5px cho thẻ li */
        }

        ul.h-menu li:hover a {
            font-weight: bold; /* Chữ đậm */
            color: white; /* Đổi màu chữ thành trắng cho dễ nhìn (tùy chọn) */
        }


        /* =========================================
           2. ĐỊNH DẠNG MENU DỌC
           ========================================= */
        ul.v-menu {
            list-style-type: none;
            padding: 0;
            margin: 0;
            width: 250px; /* Chiều rộng cố định cho menu dọc */
        }

        ul.v-menu li {
            background-color: #3498db; /* Nền xanh dương mặc định */
            border-bottom: 1px solid white; /* Đường kẻ trắng phân cách giữa các mục */
            transition: filter 0.3s ease;
        }

        /* Bỏ đường kẻ trắng ở mục cuối cùng cho đẹp */
        ul.v-menu li:last-child {
            border-bottom: none; 
        }

        ul.v-menu li a {
            display: block;
            padding: 15px 20px;
            text-decoration: none;
            color: black; /* Màu chữ đen mặc định */
            font-size: 16px;
        }

        /* Yêu cầu: Hover vào làm sáng nền 130%, chữ nghiêng */
        ul.v-menu li:hover {
            filter: brightness(130%); /* Làm sáng màu nền hiện tại lên 130% */
        }

        ul.v-menu li:hover a {
            font-style: italic; /* Chữ nghiêng */
        }

    </style>
</head>
<body>

    <ul class="h-menu">
        <li><a href="#">Trang chủ</a></li>
        <li><a href="#">Giới thiệu</a></li>
        <li><a href="#">Sản phẩm</a></li>
        <li><a href="#">Dịch vụ</a></li>
        <li><a href="#">Liên hệ</a></li>
    </ul>

    <ul class="v-menu">
        <li><a href="#">Trang chủ</a></li>
        <li><a href="#">Giới thiệu</a></li>
        <li><a href="#">Sản phẩm</a></li>
        <li><a href="#">Dịch vụ</a></li>
        <li><a href="#">Liên hệ</a></li>
    </ul>

</body>
</html>
