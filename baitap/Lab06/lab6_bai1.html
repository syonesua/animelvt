<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 06 - Bài 1: Menu Responsive</title>
    <style>
        /* =======================================
           CÀI ĐẶT CHUNG
           ======================================= */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        .navbar {
            display: flex;
            flex-direction: row;
            background-color: #333;
        }

        /* Định dạng các thẻ link */
        .navbar a {
            color: white;
            padding: 15px 20px;
            text-decoration: none;
            font-size: 16px;
        }

        .navbar a:hover {
            background-color: #555;
        }

        /* Nút Home (Mặc định ở màn hình lớn) */
        .navbar a.active {
            background-color: #6bc0f0; /* Màu xanh lơ */
            color: black;
        }

        /* Nút Hamburger mặc định bị ẩn trên PC */
        .toggle-btn {
            display: none;
            background-color: transparent;
            color: white;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 10px 20px;
        }

        /* =======================================
           HIỂN THỊ TRÊN MÀN HÌNH LỚN (PC)
           ======================================= */
        @media screen and (min-width: 601px) {
            .nav-header {
                display: flex;
            }
            .nav-links {
                display: flex;
                flex-direction: row;
            }
        }

        /* =======================================
           HIỂN THỊ TRÊN MOBILE (max-width: 600px)
           ======================================= */
        @media screen and (max-width: 600px) {
            .navbar {
                flex-direction: column;
                background-color: transparent;
            }

            /* Cả thanh Header đổi sang màu xanh lơ giống ảnh mẫu */
            .nav-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                background-color: #6bc0f0; 
            }

            .navbar a.active {
                background-color: transparent; /* Xóa màu nền riêng để hòa vào màu thanh header */
            }

            /* Hiện nút Hamburger */
            .toggle-btn {
                display: block;
            }

            /* Định dạng lại danh sách các menu thả xuống */
            .nav-links {
                display: none; /* Ẩn mặc định */
                flex-direction: column;
                background-color: #333; /* Màu xám đen */
            }

            /* Class được thêm vào bằng JS khi nhấn nút Hamburger */
            .nav-links.open {
                display: flex; 
            }

            .nav-links a {
                text-align: left;
                padding: 15px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="nav-header">
            <a href="#" class="active">Home</a>
            <button class="toggle-btn" onclick="toggleMenu()">&#9776;</button>
        </div>
        
        <div class="nav-links" id="menuLinks">
            <a href="#">News</a>
            <a href="#">Contact</a>
            <a href="#">About</a>
        </div>
    </div>

    <script>
        function toggleMenu() {
            var links = document.getElementById("menuLinks");
            // Thêm hoặc xóa class 'open' để ẩn/hiện menu
            if (links.classList.contains("open")) {
                links.classList.remove("open");
            } else {
                links.classList.add("open");
            }
        }
    </script>

</body>
</html>
